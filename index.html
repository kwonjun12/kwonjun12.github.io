<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3kwonjun12</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: rgba(255,255,255,0.06);
      --panel-2: rgba(255,255,255,0.1);
      --text: #111111;
      --muted: #555555;
      --line: rgba(0,0,0,0.08);
      --accent: #7c9cff;
      --accent-2: #87f0c6;
      --shadow: 0 4px 14px rgba(0,0,0,0.08);
      --max: 1100px;
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,156,255,0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(135,240,198,0.14), transparent 24%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .menu a:hover { color: var(--text); }

    .hero {
      padding: 80px 0 34px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,0.03);
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(1.3rem, 2.5vw, 2.4rem);
      line-height: 1.05;
      margin: 0 0 16px;
      letter-spacing: -0.03em;
    }

    .lead {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 60ch;
      margin: 0 0 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.03);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(124,156,255,0.55);
      background: var(--panel-2);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #5f7dff);
      color: white;
      border-color: transparent;
    }

    .hero-card, .card, .timeline-item, .post {
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 24px;
    }

    .hero-card h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--line);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.3rem;
      margin-bottom: 4px;
    }

    section {
      padding: 36px 0;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.8rem;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 20px;
    }

    .card h3, .post h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .card p, .post p, .timeline-item p {
      margin: 0;
      color: var(--muted);
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .pill {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,0.03);
      color: var(--text);
      font-size: 0.92rem;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .timeline-item {
      padding: 20px;
      display: grid;
      gap: 8px;
    }

    .timeline-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
    }

    .timeline-top strong { font-size: 1.05rem; }

    .posts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .post {
      overflow: hidden;
    }

    .post .thumb {
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, rgba(124,156,255,0.8), rgba(135,240,198,0.55));
    }

    .post .content {
      padding: 18px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 10px;
    }

    .contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    footer {
      padding: 36px 0 50px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      margin-top: 18px;
    }

    .small { font-size: 0.92rem; }

    @media (max-width: 900px) {
      .hero-grid, .grid-3, .posts, .contact { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .nav { flex-direction: column; align-items: flex-start; }
      .stats { grid-template-columns: 1fr; }
      h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  

  <main class="container">
    <section class="hero" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;">
        <h1 style="font-size:clamp(2rem,4vw,4rem);margin-bottom:18px;">
          안녕하세요,<br>
          PS를 좋아하는 중학생 권준영입니다.
        </h1>

        <div class="pill-list" style="justify-content:center;">
          <span class="pill">solved.ac ID: 3kwonjun12</span>
        </div>
      </div>
    </section>
  </main>

  
</body>
</html>
